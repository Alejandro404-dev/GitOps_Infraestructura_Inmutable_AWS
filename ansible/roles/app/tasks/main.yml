- name: Install runtime dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    state: present
    update_cache: true

- name: Create app directory
  ansible.builtin.file:
    path: /opt/app
    state: directory
    mode: "0755"

- name: Install app health script
  ansible.builtin.copy:
    dest: /usr/local/bin/app-health.sh
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      status="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:{{ app_port }}/health || true)"
      if [[ "${status}" == "200" ]]; then
        echo "ok"
        exit 0
      fi
      echo "health check failed"
      exit 1

- name: Install sample app server
  ansible.builtin.copy:
    dest: /opt/app/server.py
    mode: "0755"
    content: |
      #!/usr/bin/env python3
      from http.server import BaseHTTPRequestHandler, HTTPServer
      import json

      class Handler(BaseHTTPRequestHandler):
          def do_GET(self):
              if self.path == "/health":
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(json.dumps({"status": "ok"}).encode("utf-8"))
              else:
                  self.send_response(404)
                  self.end_headers()

      if __name__ == "__main__":
          server = HTTPServer(("0.0.0.0", {{ app_port }}), Handler)
          server.serve_forever()

- name: Install app systemd service
  ansible.builtin.template:
    src: app.service.j2
    dest: /etc/systemd/system/app.service
    mode: "0644"

- name: Install CloudWatch Agent config
  ansible.builtin.copy:
    src: amazon-cloudwatch-agent.json
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    mode: "0644"

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start app service
  ansible.builtin.systemd:
    name: app.service
    enabled: true
    state: started

- name: Enable and start CloudWatch Agent
  ansible.builtin.systemd:
    name: amazon-cloudwatch-agent
    enabled: true
    state: started
