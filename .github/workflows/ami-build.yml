name: ami-build

on:
  push:
    branches: [main]
    paths:
      - "packer/**"
      - "ansible/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  SSM_AMI_PARAM_NAME: /app/ami-id

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@v3

      - name: Packer init and validate
        run: |
          packer init packer/ubuntu-2204.pkr.hcl
          packer validate packer/ubuntu-2204.pkr.hcl

  build_ami:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      ami_id: ${{ steps.extract_ami.outputs.ami_id }}
      version: ${{ steps.meta.outputs.version }}
      build_date: ${{ steps.meta.outputs.build_date }}
      git_commit: ${{ steps.meta.outputs.git_commit }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-packer@v3
      
      - name: Build metadata
        id: meta
        shell: bash
        run: |
          echo "version=v$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "git_commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Initialize and Build AMI
        id: build
        shell: bash
        run: |
          packer init packer/ubuntu-2204.pkr.hcl
          
          packer build \
            -machine-readable \
            -var "aws_region=${AWS_REGION}" \
            -var "version=${{ steps.meta.outputs.version }}" \
            -var "build_date=${{ steps.meta.outputs.build_date }}" \
            -var "git_commit=${{ steps.meta.outputs.git_commit }}" \
            packer/ubuntu-2204.pkr.hcl | tee packer-build.log

      - name: Extract AMI id
        id: extract_ami
        shell: bash
        run: |
          ami_id="$(awk -F, '/artifact,0,id/ {print $6}' packer-build.log | awk -F: '{print $2}' | tail -n 1)"
          test -n "$ami_id"
          echo "ami_id=${ami_id}" >> "$GITHUB_OUTPUT"

  tag_golden:
    runs-on: ubuntu-latest
    needs: build_ami
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Tag AMI as golden
        shell: bash
        run: |
          aws ec2 create-tags \
            --resources "${{ needs.build_ami.outputs.ami_id }}" \
            --tags \
              Key=Name,Value=app-ubuntu-2204 \
              Key=Version,Value=${{ needs.build_ami.outputs.version }} \
              Key=BuildDate,Value=${{ needs.build_ami.outputs.build_date }} \
              Key=GitCommit,Value=${{ needs.build_ami.outputs.git_commit }} \
              Key=Golden,Value=true

      - name: Update SSM Parameter
        shell: bash
        run: |
          aws ssm put-parameter \
            --name "${{ env.SSM_AMI_PARAM_NAME }}" \
            --value "${{ needs.build_ami.outputs.ami_id }}" \
            --type "String" \
            --overwrite