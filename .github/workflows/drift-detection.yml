name: drift-detection

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: terraform init -input=false
      - name: Terraform plan detailed exit code
        id: tfplan
        shell: bash
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -no-color > plan.txt
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Create issue when drift is detected
        if: ${{ steps.tfplan.outputs.exit_code == '2' }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Terraform drift detected - ${{ github.run_id }}"
          content-filepath: Terraform/plan.txt
          labels: |
            drift
            terraform
